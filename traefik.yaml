# Application 2: Traefik Helm Chart (sync wave 0)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 39.0.0
    helm:
      values: |
        # Dashboard disabled
        ingressRoute:
          dashboard:
            enabled: false
        
        # ⚠️ CRITICAL FIX: Explicitly disable experimental plugins
        experimental:
          plugins: {}
          # OR use:
          # plugins:
          #   enabled: false
        
        # Entrypoints
        ports:
          web:
            port: 8000
            exposedPort: 80
            protocol: TCP
          websecure:
            port: 8443
            exposedPort: 443
            protocol: TCP
        
        # Service configuration
        service:
          enabled: true
          type: LoadBalancer
          namespace: traefik
          annotations:
            service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
            service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        
        # Resources
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        
        # RBAC
        rbac:
          enabled: true
          namespaced: false
        
        # Providers
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          kubernetesIngress:
            enabled: true
        
        # Logs
        logs:
          access:
            enabled: true
        
        # Metrics
        deployment:
          podAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8082"
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    automated:
      prune: true
      selfHeal: true