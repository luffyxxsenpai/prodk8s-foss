apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]

        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]

        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]

        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

      expireAfter: 720h

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    # budgets:
    #   # Never disrupt more than 20% of nodes at once
    #   - nodes: "20%"
    #   # Block ALL disruption during business hours (IST = UTC+5:30, so 9am IST = 3:30 UTC)
    #   - nodes: "0"
    #     schedule: "30 3 * * 1-5"
    #     duration: 9h
    #     reasons:
    #       - Underutilized    
  limits:
    cpu: "50"
    memory: 200Gi
