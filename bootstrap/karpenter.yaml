apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  source:
    repoURL: oci://public.ecr.aws/karpenter/karpenter  # Added oci://
    chart: karpenter
    targetRevision: 1.10.0  # Removed 'v' prefix
    helm:
      values: |
        settings:
          clusterName: prod-proj-fin
          interruptionQueue: Karpenter-prod-proj-fin
        
        # Add cluster endpoint (required)
        settings:
          clusterName: prod-proj-fin
          clusterEndpoint: https://your-eks-cluster-endpoint  # Add this!
          interruptionQueue: Karpenter-prod-proj-fin
        
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::537124957197:role/KarpenterControllerRole-prod-proj-fin
        
        controller:
          tolerations:
            - key: "CriticalAddonsOnly"
              operator: "Exists"
              effect: "NoSchedule"
          nodeSelector:
            role: system
        
        # Add these required settings
        webhook:
          port: 8443
        
        resources:
          requests:
            cpu: 1
            memory: 1Gi
          limits:
            cpu: 2
            memory: 2Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
