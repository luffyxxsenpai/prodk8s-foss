apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: oci://public.ecr.aws/karpenter/karpenter
    chart: karpenter-crd
    targetRevision: 1.10.0
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
