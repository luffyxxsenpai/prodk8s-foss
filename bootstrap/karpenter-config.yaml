apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-config
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/luffyxxsenpai/prodk8s-foss
    targetRevision: main
    path: apps/karpenter

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
