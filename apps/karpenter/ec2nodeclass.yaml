apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: KarpenterNodeRole-prod-proj-fin
  amiSelectorTerms:
    - alias: al2023@latest

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: prod-proj-fin

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: prod-proj-fin

  tags:
    karpenter.sh/cluster: prod-proj-fin
    managed-by: karpenter
