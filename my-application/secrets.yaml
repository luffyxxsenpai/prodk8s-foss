apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: default
type: Opaque
stringData:
  MONGO_URI: mongodb://admin:password@mongo-service:27017/wanderblog?authSource=admin
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secrets
  namespace: default
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: admin
  MONGO_INITDB_ROOT_PASSWORD: password